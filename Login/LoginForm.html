<!DOCTYPE html>
<html lang="en">
<head>
  <title>Form Login By Nh4nisme</title>
	<link rel="stylesheet" href="LoginForm1.css">
	<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
	
<body>
	<header>
		<img class="logo" src="zyro-image.png">
		<nav class="navigation">
			<a href="LonginForm1 - Home.html">Home</a>
			<a href="LonginForm1 - About.html">About</a>
			<a href="LonginForm1 - services.html">Services</a>
			<a href="LonginForm1 - Contact.html">Contact</a>
			<button class="btnlogin-popup">Login</button>
		</nav>
	</header>

	<section>
		<div class="wrapper">
			<span class="icon-close"><ion-icon name="close-outline"></ion-icon></span>
			
			<div class="formbox login">
				<h2>Login</h2>
				<form action="#">
					<div class="input-box">
						<span class="icon"><ion-icon name="mail-outline"></ion-icon></span>
						<input type="email" required>
						<label>Email</label>
					</div>
					
					<div class="input-box">
						<span class="icon"><ion-icon name="lock-closed-outline"></ion-icon></span>
						<input type="password" required>
						<label>Password</label>
					</div>
					
					<div class="remember-forgot">
						<label><input type="checkbox">Remember Me</label> 
						<a href="#">Forgot Password?</a>
					</div>
					<button type="submit" class="btn">Login</button>
					<div class="login-register">
						<p>Don't have an account? <a href="#" class="register-link">Register</a></p>
					</div>
				</form>
			</div>
			
			
			<div class="formbox register">
				<h2>Registration</h2>
				<form action="#">
					<div class="input-box">
						<span class="icon"><ion-icon name="person-outline"></ion-icon></span>
						<input type="text" required>
						<label>Username</label>
					</div>
					
					<div class="input-box">
						<span class="icon"><ion-icon name="mail-outline"></ion-icon></span>
						<input type="email" required>
						<label>Email</label>
					</div>
					
					<div class="input-box">
						<span class="icon"><ion-icon name="lock-closed-outline"></ion-icon></span>
						<input type="password" required>
						<label>Password</label>
					</div>
					
					<div class="remember-forgot">
						<label><input type="checkbox">I agree to the terms &amp; conditions</label> 
					</div>
					<button type="submit" class="btn">Register</button>
					<div class="login-register">
						<p>Already have an account? <a href="#" class="login-link">Login</a></p>
					</div>
				</form>
			</div>
		</div>
	</section>

	<script src="LoginForm1.js"></script>	
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
